<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1 class="game-title">五子棋</h1>
      <div class="game-info">
        <div class="current-player">
          <span class="player-label">当前玩家:</span>
          <span class="player-piece player-black"></span>
          <span class="player-name">黑棋</span>
        </div>
        <div class="game-actions">
          <span class="game-status">游戏进行中</span>
          <button id="bgBtn" class="btn btn-icon" title="更换背景">🎨</button>
          <button id="musicBtn" class="btn btn-icon" title="更换音乐">🎵</button>
        </div>
        <div class="replay-actions">
          <button id="recordBtn" class="btn btn-icon" title="开始/停止录像">⏺</button>
          <button id="replayBtn" class="btn btn-icon" title="回放最近录像">▶</button>
          <button id="pauseReplayBtn" class="btn btn-icon" title="暂停/继续回放">⏸</button>
          <button id="restartReplayBtn" class="btn btn-icon" title="从头回放">⏮</button>
          <button id="exportReplayBtn" class="btn btn-icon" title="导出录像JSON">💾</button>
          <button id="importReplayBtn" class="btn btn-icon" title="导入录像JSON">📂</button>
          <select id="replaySpeed" class="replay-speed" title="回放速度">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
          <input id="replayFileInput" type="file" accept="application/json,.json" hidden>
        </div>
      </div>
    </header>

    <main class="game-main">
      <div class="board-container">
        <canvas id="gameCanvas"></canvas>
      </div>
    </main>

    <footer class="game-footer">
      <div class="game-controls">
        <button id="restartBtn" class="btn btn-primary">重新开始</button>
        <button id="undoBtn" class="btn btn-secondary">悔棋</button>
      </div>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
